<h1>זאת הקומפוננטה שבתוך PRODUCTS</h1>.
<div class="products-grid">
  @for (item of allProducts; track item.id) {
    <div class="product-card">
      <img [src]="item.image1" [routerLink]="['/product', item.id]" style="cursor: pointer;">
      
      <h3>{{ item.name }}</h3>
      <p>₪{{ item.price }}</p>
    </div>
  }
</div>
