<div class="grid">
  @for (product of pagedProducts; track product.id) {
    <app-product [product]="product"></app-product>
  }
</div>

@if (totalPages > 1) {
  <div class="pagination">
    @for (p of pages(); track p) {
      <button
        type="button"
        class="page-btn"
        [class.active]="p === currentPage"
        (click)="goToPage(p)"
      >
        {{ p }}
      </button>
    }
  </div>
}
