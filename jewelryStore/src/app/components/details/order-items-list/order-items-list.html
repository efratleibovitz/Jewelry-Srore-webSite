<div class="items-container">
  <div class="item-row" *ngFor="let item of items">
    
    <div class="img-container">
      <img [src]="item.image" [alt]="item.productName" class="product-image">    </div>

    <div class="item-details">
      <div class="main-info">
        <a [routerLink]="[item.productUrl]" class="product-name">
          {{ item.productName }}
        </a>
        <p class="product-meta">מידה: {{ item.size }} | כמות: {{ item.quantity }}</p>
      </div>
      
      <div class="price-area">
        <span class="currency">₪</span>
        <span class="price-value">{{ item.price | number:'1.2-2' }}</span>
      </div>
    </div>

  </div>
</div>
