<body>
    <div class="content">
          <div class="existUser">
              <div class="title">
                  <h3>כניסה לחשבון שלי</h3>
              </div>
              
              <label for="userN">כתובת דואר אלקטרוני</label>
              <input type="email" id="userN" #loginEmail required />
              
              <label for="pass">סיסמא</label>
              <input type="password" id="pass" #loginPass required />
              
              <button (click)="onLogin(loginEmail.value, loginPass.value)" class="button">כניסה</button>

              <div class="socialDivider">
                  <span>או</span>
              </div>

              <button class="socialBtn facebook">
                  <span class="text">התחברות עם פייסבוק</span>
                  <span class="icon">
                      <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7h-2.7V12h2.7V9.8c0-2.7 1.6-4.2 4-4.2 1.2 0 2.5.2 2.5.2v2.7h-1.4c-1.4 0-1.8.9-1.8 1.7V12h3.1l-.5 2.9h-2.6v7A10 10 0 0 0 22 12z"/></svg>
                  </span>
              </button>

              <button class="socialBtn google">
                  <span class="text">התחברות עם גוגל</span>
                  <span class="icon">
                      <svg viewBox="0 0 48 48" width="18" height="18"><path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.5l6.9-6.9C35.8 2.4 30.3 0 24 0 14.6 0 6.4 5.5 2.5 13.5l8 6.2C12.5 13.3 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4 c-.5 2.7-2 5-4.3 6.5l6.6 5.1c3.9-3.6 6.4-8.9 6.4-15.6z"/><path fill="#FBBC05" d="M10.5 28.3A14.6 14.6 0 0 1 9.5 24 c0-1.5.3-2.9 1-4.3l-8-6.2A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.5l8-6.2z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.4-5.8l-6.6-5.1 c-2 1.4-4.6 2.2-8.8 2.2-6.3 0-11.5-3.8-13.5-9.2l-8 6.2C6.4 42.5 14.6 48 24 48z"/></svg>
                  </span>
              </button>
          </div>



        <div class="newUser">
          <div class="title">
              <h3>רישום לאתר</h3>
          </div>
          
          <label for="userName">כתובת דואר אלקטרוני</label>
          <input type="email" id="userName" #userNameInput name="userName" required />
          
          <label for="firstName">שם פרטי</label>
          <input type="text" id="firstName" #firstNameInput name="firstName" required />
          
          <label for="lastName">שם משפחה</label>
          <input type="text" id="lastName" #lastNameInput name="lastName" required />
          
          <label for="password">סיסמא</label>
          <input type="password" id="password" #passwordInput name="password" required />
          
      <button (click)="checkPasswordLevel(passwordInput.value)" class="check">בדוק רמת סיסמא</button>    <progress class="progressBar" max="100" value="0"></progress>

          <label for="city">עיר</label>
          <input type="text" id="city" #cityInput required />

          <label for="street">רחוב</label>
          <input type="text" id="street" #streetInput required />

          <label for="houseNum">מספר בית</label>
          <input type="number" id="houseNum" #houseNumInput required />

          <label for="phone">טלפון</label>
          <input type="tel" id="phone" #phoneInput required />

          <button (click)="postResponse(userNameInput.value, firstNameInput.value, lastNameInput.value, passwordInput.value, cityInput.value, streetInput.value, houseNumInput.value, phoneInput.value)" class="button">שליחה</button>
</div>
</div>

</body>
